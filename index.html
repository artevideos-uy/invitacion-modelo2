<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invitación - 15 años</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Forum&family=Great+Vibes&family=Josefin+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Lora:wght@400;500;600;700&family=Marcellus&family=Montserrat:wght@400;500;600;700&family=Parisienne&family=Petit+Formal+Script&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
  --color-fondo: #080607;
  --color-nombre: #9b223a;
  --color-mis15: #e8b7c6;
  --color-texto-suelto: #ffffff;
  --color-titulo: #e8b7c6;
  --color-icono: #e8b7c6;
  --color-texto-box: #ffffff;
  --color-texto-box-suave: rgba(255, 255, 255, 0.78);
  --color-box: rgba(255, 244, 248, 0.18);
  --color-box-borde: rgba(255, 255, 255, 0.24);
  --color-boton-1: #e8b7c6;
  --color-boton-2: #f7dde5;
  --color-boton-texto: #211318;
  --color-boton-borde: rgba(255, 255, 255, 0.3);
  --color-contador-numero: #f7dde5;
  --color-contador-texto: rgba(255, 255, 255, 0.78);
  --color-mini-box: rgba(0, 0, 0, 0.26);
  --color-mini-box-borde: rgba(255, 255, 255, 0.12);
  --color-panel: rgba(0, 0, 0, 0.28);
  --color-panel-borde: rgba(255, 255, 255, 0.16);
  --color-overlay-arriba: rgba(0, 0, 0, 0.34);
  --color-overlay-abajo: rgba(0, 0, 0, 0.58);
  --color-overlay-lados: rgba(0, 0, 0, 0.50);
  --color-overlay-centro: rgba(0, 0, 0, 0.16);
  --sombra: rgba(0, 0, 0, 0.28);
  --title-font: 'Great Vibes', cursive;
  --body-font: 'Cormorant Garamond', serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--body-font);
  background: var(--color-fondo);
  color: var(--color-texto-suelto);
  overflow-x: hidden;
  padding-bottom: 56px;
}

.background {
  position: fixed;
  inset: 0;
  z-index: -2;
  overflow: hidden;
  background: var(--color-fondo);
}

.background video {
  position: absolute;
  top: 0;
  left: 0;
}

.bg-video-fill {
  display: none;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(26px) brightness(0.42) contrast(1.08) saturate(1.15);
  transform: scale(1.12);
}

.bg-video-main {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  filter: brightness(0.52) contrast(1.08) saturate(1.08);
  transform: scale(1.02);
}

.overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    linear-gradient(180deg, var(--color-overlay-arriba), var(--color-overlay-abajo)),
    radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.12), transparent 35%);
}
